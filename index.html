<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#16091f" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2316091f'/%3E%3Ccircle cx='32' cy='35' r='19' fill='%2386d44a'/%3E%3Ccircle cx='25' cy='31' r='4' fill='%23ff3b3b'/%3E%3Ccircle cx='39' cy='31' r='4' fill='%23ff3b3b'/%3E%3Crect x='24' y='44' width='16' height='4' rx='2' fill='%2316091f'/%3E%3C/svg%3E" />
  <title>Zombie Mall</title>
  <link rel="stylesheet" href="style.css" />
  <!-- CrazyGames SDK (loads if available; game runs fine without it) -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="game-root">
    <!-- Canvas gameplay layer -->
    <canvas id="game-canvas"></canvas>

    <!-- ============ DOM UI OVERLAYS ============ -->

    <!-- Loading -->
    <div id="loading" class="screen">
      <div class="logo">ZOMBIE MALL<br /><span>TYCOON SURVIVOR</span></div>
      <div class="loadbar"><div id="loadbar-fill"></div></div>
      <div class="loadtip" data-i18n="loading">Cargando…</div>
    </div>

    <!-- Main menu -->
    <div id="menu" class="screen hidden">
      <div class="logo">ZOMBIE MALL<br /><span>TYCOON SURVIVOR</span></div>
      <div class="menu-sub" data-i18n="tagline">…</div>
      <button class="btn btn-primary" id="btn-play"><span class="g">▶</span> <span data-i18n="play">PLAY</span></button>
      <button class="btn" id="btn-meta"><span class="stat-ico" data-ico="build" data-size="20"></span> <span data-i18n="upgrades">UPGRADES</span> · <span id="menu-tokens">0</span> <span class="stat-ico" data-ico="token" data-size="16"></span></button>
      <button class="btn btn-ghost" id="btn-howto"><span data-i18n="howtoBtn">How to play</span></button>
      <div class="menu-foot">
        <div class="foot-row">
          <button class="icon-btn" id="btn-mute">🔊</button>
          <button class="icon-btn" id="btn-lang">ES</button>
        </div>
        <span class="hint" data-i18n="hint">…</span>
      </div>
    </div>

    <!-- How to play -->
    <div id="howto" class="screen modal hidden">
      <div class="panel">
        <h2 data-i18n="howtoTitle">How to play</h2>
        <ul class="howto-list">
          <li><span class="li-ico" data-ico="speed" data-size="22"></span><span data-i18n="howto1"></span></li>
          <li><span class="li-ico" data-ico="gun" data-size="22"></span><span data-i18n="howto2"></span></li>
          <li><span class="li-ico" data-ico="build" data-size="22"></span><span data-i18n="howto3"></span></li>
          <li><span class="li-ico" data-ico="cash" data-size="22"></span><span data-i18n="howto4"></span></li>
          <li><span class="li-ico" data-ico="star" data-size="22"></span><span data-i18n="howto5"></span></li>
          <li><span class="li-ico" data-ico="skull" data-size="22"></span><span data-i18n="howto6"></span></li>
        </ul>
        <button class="btn btn-primary" id="btn-howto-close" data-i18n="gotIt">Got it!</button>
      </div>
    </div>

    <!-- Meta upgrades -->
    <div id="meta" class="screen modal hidden">
      <div class="panel wide">
        <h2><span data-i18n="metaTitle">Permanent upgrades</span> <span class="token-pill"><span id="meta-tokens">0</span> <span class="stat-ico" data-ico="token" data-size="16"></span></span></h2>
        <div id="meta-grid" class="meta-grid"></div>
        <button class="btn btn-primary" id="btn-meta-close" data-i18n="back">Back</button>
      </div>
    </div>

    <!-- In-game HUD -->
    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="hud-stat hp">
          <div class="bar"><div id="hp-fill"></div></div>
          <span id="hp-text">100/100</span>
        </div>
        <div class="hud-stat cash"><span class="stat-ico" data-ico="cash"></span> <span id="cash-text">$0</span> <small id="income-text">(+$0/s)</small></div>
        <div class="hud-stat wave"><span class="stat-ico" data-ico="skull"></span> <span data-i18n="waveLabel">WAVE</span> <span id="wave-text">1</span></div>
        <div class="hud-stat time"><span class="stat-ico" data-ico="clock"></span> <span id="time-text">0:00</span></div>
      </div>
      <div class="hud-xp">
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <span id="lvl-text">Lv 1</span>
      </div>

      <!-- Refuge Fame (revealed after the first ~30s / 2nd store) -->
      <div class="hud-fame" id="hud-fame">
        <span id="fame-tier">Hideout</span>
        <div class="fame-bar"><div id="fame-fill"></div></div>
        <span class="surv"><span class="stat-ico" data-ico="surv"></span> <span id="surv-text">0</span></span>
      </div>

      <!-- event toasts -->
      <div id="toasts"></div>

      <!-- mobile joystick -->
      <div id="joystick" class="hidden"><div id="joystick-knob"></div></div>

      <div class="hud-bottom">
        <button class="boost-btn" id="btn-boost"><span class="stat-ico" data-ico="boost" data-size="16"></span> <span id="boost-label">x2 INCOME 60s</span></button>
        <button class="icon-btn" id="btn-pause">⏸</button>
      </div>

      <!-- wave banner -->
      <div id="wave-banner" class="wave-banner hidden"></div>
    </div>

    <!-- Build / store menu -->
    <div id="build-menu" class="screen modal hidden">
      <div class="panel">
        <h2 id="build-title">Build store</h2>
        <div id="build-list" class="build-list"></div>
        <button class="btn btn-ghost" id="btn-build-close" data-i18n="close">Close</button>
      </div>
    </div>

    <!-- Trader -->
    <div id="trader" class="screen modal hidden">
      <div class="panel">
        <h2><span class="stat-ico" data-ico="trader" data-size="24"></span> <span data-i18n="traderTitle">Refuge trader</span></h2>
        <p class="levelup-sub" data-i18n="traderSub">…</p>
        <div id="trader-list" class="build-list"></div>
        <button class="btn btn-ghost" id="btn-trader-close" data-i18n="close">Close</button>
      </div>
    </div>

    <!-- Level up -->
    <div id="levelup" class="screen modal hidden">
      <div class="panel">
        <h2 data-i18n="levelTitle">LEVEL UP!</h2>
        <p class="levelup-sub" data-i18n="chooseUpg">Choose an upgrade</p>
        <div id="card-row" class="card-row"></div>
      </div>
    </div>

    <!-- Pause -->
    <div id="pause" class="screen modal hidden">
      <div class="panel">
        <h2 data-i18n="pauseTitle">Paused</h2>
        <button class="btn btn-primary" id="btn-resume"><span class="g">▶</span> <span data-i18n="resume">Resume</span></button>
        <button class="btn" id="btn-pause-mute"><span id="pmute-ico">🔊</span> <span data-i18n="sound">Sound</span></button>
        <button class="btn btn-ghost" id="btn-quit" data-i18n="quitMenu">Quit to menu</button>
      </div>
    </div>

    <!-- Game over -->
    <div id="gameover" class="screen modal hidden">
      <div class="panel">
        <h2 id="go-title">GAME OVER</h2>
        <div id="go-stats" class="go-stats"></div>
        <div class="go-tokens"><span data-i18n="tokensEarned">Tokens earned:</span> <b id="go-tokens">+0</b> <span class="stat-ico" data-ico="token" data-size="16"></span></div>
        <div class="go-buttons">
          <button class="btn btn-primary" id="btn-revive"><span class="stat-ico" data-ico="boost" data-size="16"></span> <span data-i18n="revive">REVIVE</span></button>
          <button class="btn btn-primary" id="btn-double"><span class="stat-ico" data-ico="boost" data-size="16"></span> <span data-i18n="x2tokens">x2 TOKENS</span></button>
          <button class="btn" id="btn-retry"><span class="g">⟳</span> <span data-i18n="retry">Retry</span></button>
          <button class="btn btn-ghost" id="btn-menu" data-i18n="menu">Menu</button>
        </div>
      </div>
    </div>

    <!-- floating combat text layer is drawn on canvas -->

    <!-- Rotate-to-landscape (mobile portrait) -->
    <div id="rotate" class="hidden">
      <div class="phone">📱</div>
      <h2 data-i18n="rotateTitle">Rotate your device</h2>
      <p data-i18n="rotateBody">…</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
